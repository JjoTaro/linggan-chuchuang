name = "linggan-chuchuang-proxy"
main = "worker.js"
compatibility_date = "2025-01-01"

# DeepSeek（OpenAI 兼容）。换其他服务商改 UPSTREAM_URL 即可；
# 仅 Anthropic 需把 AUTH_STYLE 改成 "x-api-key"。
[vars]
UPSTREAM_URL = "https://api.deepseek.com/chat/completions"
AUTH_STYLE = "bearer"

# 注意：DeepSeek 的密钥是 Secret，不写在这里。
# 部署后由你本人在终端执行：  wrangler secret put API_KEY

# ===== 跨设备同步用的 KV =====
# 第一步，终端建命名空间：      wrangler kv namespace create SYNC
# 第二步，把输出里的 id 填到下面，并去掉这 3 行前面的 # ：
# [[kv_namespaces]]
# binding = "SYNC"
# id = "把 wrangler 输出的 id 填这里"
# 第三步，重新部署：            wrangler deploy
